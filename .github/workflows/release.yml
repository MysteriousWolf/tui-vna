name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Run tests before release
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml
    with:
      skip_build: true
    secrets: inherit

  build:
    needs: test
    name: Build on ${{ matrix.os }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: tina
            quick_binary_name: tina-quick
          - os: windows-latest
            binary_name: tina.exe
            quick_binary_name: tina-quick.exe
          - os: macos-latest
            binary_name: tina
            quick_binary_name: tina-quick

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build executables
        run: |
          uv run pyinstaller --clean scripts/tina.spec
          uv run pyinstaller --clean scripts/tina-quick.spec

      - name: Upload binaries to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-binaries
          path: |
            dist/${{ matrix.binary_name }}
            dist/${{ matrix.quick_binary_name }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      models: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"

          # Linux
          if [ -f artifacts/ubuntu-latest-binaries/tina ]; then
            mv artifacts/ubuntu-latest-binaries/tina release-assets/tina-${VERSION}-linux-x86_64
            chmod +x release-assets/tina-${VERSION}-linux-x86_64
          fi
          if [ -f artifacts/ubuntu-latest-binaries/tina-quick ]; then
            mv artifacts/ubuntu-latest-binaries/tina-quick release-assets/tina-quick-${VERSION}-linux-x86_64
            chmod +x release-assets/tina-quick-${VERSION}-linux-x86_64
          fi

          # Windows
          if [ -f artifacts/windows-latest-binaries/tina.exe ]; then
            mv artifacts/windows-latest-binaries/tina.exe release-assets/tina-${VERSION}-windows-x86_64.exe
          fi
          if [ -f artifacts/windows-latest-binaries/tina-quick.exe ]; then
            mv artifacts/windows-latest-binaries/tina-quick.exe release-assets/tina-quick-${VERSION}-windows-x86_64.exe
          fi

          # macOS ARM64 (Apple Silicon)
          if [ -f artifacts/macos-latest-binaries/tina ]; then
            mv artifacts/macos-latest-binaries/tina release-assets/tina-${VERSION}-macos-arm64
            chmod +x release-assets/tina-${VERSION}-macos-arm64
          fi
          if [ -f artifacts/macos-latest-binaries/tina-quick ]; then
            mv artifacts/macos-latest-binaries/tina-quick release-assets/tina-quick-${VERSION}-macos-arm64
            chmod +x release-assets/tina-quick-${VERSION}-macos-arm64
          fi

          ls -lah release-assets/

      - name: Gather release data
        id: data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname --merged "${GITHUB_REF_NAME}" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          RELEASE_TITLE=$(git tag -l --format='%(contents:subject)' "${GITHUB_REF_NAME}")
          RELEASE_TITLE="${RELEASE_TITLE:-${GITHUB_REF_NAME}}"

          echo "prev_tag=${PREV_TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${RELEASE_TITLE}" >> "${GITHUB_OUTPUT}"

          if [ -z "${PREV_TAG}" ]; then
            printf 'Initial release.\n' > /tmp/commits.txt
            printf '' > /tmp/dep_diff.txt
          else
            gh api "repos/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" \
              --jq '.commits[] | "- \(.commit.message | split("\n")[0]) by @\(.author.login // .commit.author.name)"' \
              > /tmp/commits.txt
            git diff "${PREV_TAG}...${GITHUB_REF_NAME}" -- pyproject.toml > /tmp/dep_diff.txt 2>/dev/null || true
          fi

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          PREV_TAG: ${{ steps.data.outputs.prev_tag }}
          RELEASE_TITLE: ${{ steps.data.outputs.release_title }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          DEP_DIFF=$(cat /tmp/dep_diff.txt)

          PROMPT=$(printf \
            'You are writing GitHub release notes for "tina", a terminal-based TUI application for controlling Vector Network Analyzers (VNAs). Write for a technical developer audience.\n\nRelease: %s\nTitle: %s\nPrevious release: %s\n\nGenerate rich Markdown release notes using this exact structure (omit any section with no relevant content):\n\n> %s\n\n[1-2 sentence intro describing the overall scope of this release]\n\n---\n\n## ✨ What'"'"'s New\n\n[Group new features into themed ### subsections with a relevant emoji (e.g. ### 📤 Export Engine). Use bullet points with **bold** feature name followed by em-dash and description.]\n\n---\n\n## 🏗️ Architecture & Refactoring\n\n[Significant internal structural changes. Omit this section entirely if none.]\n\n---\n\n## 🐛 Bug Fixes\n\n[Bulleted list. Each item starts with "Fixed". Omit if none.]\n\n---\n\n## 🧪 Testing\n\n[Summary of new or expanded test coverage. Omit if none.]\n\n---\n\n## 📦 Dependency Updates\n\n[Markdown table with columns: Package | From | To. Derive from the pyproject.toml diff. Omit if no dependency changes.]\n\n---\n\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n\nRules:\n- Skip CI, formatting, and internal tooling commits\n- Be specific and technical\n- Features use present tense, bug fixes use past tense\n\nCommits since %s:\n%s\n\npyproject.toml diff (for dependency table):\n%s' \
            "${GITHUB_REF_NAME}" "${RELEASE_TITLE}" "${PREV_TAG}" \
            "${RELEASE_TITLE}" \
            "${GITHUB_REPOSITORY}" "${PREV_TAG}" "${GITHUB_REF_NAME}" \
            "${PREV_TAG}" "${COMMITS}" "${DEP_DIFF}")

          BODY=$(curl -sf --connect-timeout 10 --max-time 60 \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$(jq -n --arg p "$PROMPT" '{
              model: "openai/gpt-4o-mini",
              max_tokens: 4096,
              messages: [{"role": "user", "content": $p}]
            }')" 2>/dev/null \
            | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)

          if [ -z "$BODY" ]; then
            {
              printf '> **Note:** automated release notes generation failed or timed out; showing simplified commit list.\n\n'
              printf '> %s\n\n## Commits\n\n%s\n' "${RELEASE_TITLE}" "${COMMITS}"
              [ -n "${PREV_TAG}" ] && printf '\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
                "${GITHUB_REPOSITORY}" "${PREV_TAG}" "${GITHUB_REF_NAME}"
            } > /tmp/release_body.md
          else
            printf '%s\n' "$BODY" > /tmp/release_body.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.data.outputs.release_title }}
          body_path: /tmp/release_body.md
          files: release-assets/*
          fail_on_unmatched_files: true
