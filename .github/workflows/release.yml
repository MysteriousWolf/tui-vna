name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  test:
    name: Run tests before release
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: tina
            quick_binary_name: tina-quick
            artifact_name: tina-linux-x86_64
            quick_artifact_name: tina-quick-linux-x86_64
          - os: windows-latest
            binary_name: tina.exe
            quick_binary_name: tina-quick.exe
            artifact_name: tina-windows-x86_64.exe
            quick_artifact_name: tina-quick-windows-x86_64.exe
          - os: macos-latest
            binary_name: tina
            quick_binary_name: tina-quick
            artifact_name: tina-macos-x86_64
            quick_artifact_name: tina-quick-macos-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          uv sync
          uv add --group dev pyinstaller

      - name: Build main executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: uv run pyinstaller --clean scripts/tina.spec

      - name: Build quick executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: uv run pyinstaller --clean scripts/tina-quick.spec

      - name: Build main executable (Windows)
        if: runner.os == 'Windows'
        run: uv run pyinstaller --clean scripts/tina.spec

      - name: Build quick executable (Windows)
        if: runner.os == 'Windows'
        run: uv run pyinstaller --clean scripts/tina-quick.spec

      - name: Upload binaries to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binaries
          path: |
            dist/${{ matrix.binary_name }}
            dist/${{ matrix.quick_binary_name }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"

          # Linux
          if [ -f artifacts/ubuntu-latest-binaries/tina ]; then
            mv artifacts/ubuntu-latest-binaries/tina release-assets/tina-${VERSION}-linux-x86_64
            chmod +x release-assets/tina-${VERSION}-linux-x86_64
          fi
          if [ -f artifacts/ubuntu-latest-binaries/tina-quick ]; then
            mv artifacts/ubuntu-latest-binaries/tina-quick release-assets/tina-quick-${VERSION}-linux-x86_64
            chmod +x release-assets/tina-quick-${VERSION}-linux-x86_64
          fi

          # Windows
          if [ -f artifacts/windows-latest-binaries/tina.exe ]; then
            mv artifacts/windows-latest-binaries/tina.exe release-assets/tina-${VERSION}-windows-x86_64.exe
          fi
          if [ -f artifacts/windows-latest-binaries/tina-quick.exe ]; then
            mv artifacts/windows-latest-binaries/tina-quick.exe release-assets/tina-quick-${VERSION}-windows-x86_64.exe
          fi

          # macOS
          if [ -f artifacts/macos-latest-binaries/tina ]; then
            mv artifacts/macos-latest-binaries/tina release-assets/tina-${VERSION}-macos-x86_64
            chmod +x release-assets/tina-${VERSION}-macos-x86_64
          fi
          if [ -f artifacts/macos-latest-binaries/tina-quick ]; then
            mv artifacts/macos-latest-binaries/tina-quick release-assets/tina-quick-${VERSION}-macos-x86_64
            chmod +x release-assets/tina-quick-${VERSION}-macos-x86_64
          fi

          ls -lah release-assets/

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname --merged "${GITHUB_REF_NAME}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

          # Find the base minor tag (e.g. v0.2.0 for v0.2.3) for the recap section
          MAJOR_MINOR=$(echo "${GITHUB_REF_NAME}" | grep -oE '^v[0-9]+\.[0-9]+')
          BASE_MINOR_TAG=$(git tag --sort=version:refname | grep -E "^${MAJOR_MINOR}\\.0$" | tail -1)
          # Only useful if it differs from both the current tag and prev tag
          if [ "$BASE_MINOR_TAG" = "${GITHUB_REF_NAME}" ] || [ "$BASE_MINOR_TAG" = "$PREV_TAG" ]; then
            BASE_MINOR_TAG=""
          fi
          echo "base_minor_tag=${BASE_MINOR_TAG}" >> $GITHUB_OUTPUT

          if [ -z "$PREV_TAG" ]; then
            echo "changelog=Initial release" >> $GITHUB_OUTPUT
          else
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            gh api "repos/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" \
              --jq '.commits[] | "- \(.commit.message | split("\n")[0]) by @\(.author.login // .commit.author.name)"' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

          # Recap: all commits since the base minor tag (only for patch releases)
          if [ -n "$BASE_MINOR_TAG" ]; then
            echo "recap<<EOF" >> $GITHUB_OUTPUT
            gh api "repos/${GITHUB_REPOSITORY}/compare/${BASE_MINOR_TAG}...${GITHUB_REF_NAME}" \
              --jq '.commits[] | "- \(.commit.message | split("\n")[0]) by @\(.author.login // .commit.author.name)"' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Generate AI release summary
        id: ai_summary
        env:
          GH_TOKEN: ${{ github.token }}
          COMMITS: ${{ steps.changelog.outputs.changelog }}
          RECAP_COMMITS: ${{ steps.changelog.outputs.recap }}
        run: |
          call_model() {
            local prompt="$1"
            curl -sf --connect-timeout 10 --max-time 30 https://models.inference.ai.azure.com/chat/completions \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg p "$prompt" '{
                model: "gpt-4o-mini",
                max_tokens: 512,
                messages: [{"role": "user", "content": $p}]
              }')" 2>/dev/null \
            | jq -r '.choices[0].message.content // empty' 2>/dev/null || true
          }

          BASE_PROMPT="You are writing GitHub release notes for tina, a terminal-based VNA (Vector Network Analyzer) control application. Write a concise summary grouped by theme using bold markdown headers. Be specific about what changed. Skip CI, formatting, documentation-only, and internal tooling commits."

          SUMMARY=$(call_model "${BASE_PROMPT}

Commits since last release:
${COMMITS}")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "${SUMMARY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -n "$RECAP_COMMITS" ]; then
            RECAP=$(call_model "${BASE_PROMPT}

Write a brief one-paragraph recap (no headers) summarising all changes in this minor release series so far.

All commits in this minor release series:
${RECAP_COMMITS}")
            echo "recap<<EOF" >> $GITHUB_OUTPUT
            echo "${RECAP}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Compose release body
        id: release_body
        env:
          SUMMARY: ${{ steps.ai_summary.outputs.summary }}
          RECAP: ${{ steps.ai_summary.outputs.recap }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          PREV_TAG: ${{ steps.changelog.outputs.prev_tag }}
          BASE_MINOR_TAG: ${{ steps.changelog.outputs.base_minor_tag }}
        run: |
          {
            echo "body<<EOF"
            if [ -n "$SUMMARY" ]; then
              echo "$SUMMARY"
              echo ""
            fi
            if [ -n "$RECAP" ]; then
              echo "---"
              echo ""
              echo "**Release series recap** (since ${BASE_MINOR_TAG}): ${RECAP}"
              echo ""
            fi
            echo "---"
            echo ""
            echo "## Commits"
            echo "$CHANGELOG"
            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_body.outputs.body }}
          files: release-assets/*
          fail_on_unmatched_files: true
