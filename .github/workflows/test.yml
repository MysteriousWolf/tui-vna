name: Test

on:
  push:
    tags-ignore:
      - "**"
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"
  workflow_call:
    inputs:
      skip_build:
        description: Skip the PyInstaller build check (e.g. when the caller runs its own build)
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install system dependencies
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: uv sync --group test

      - name: Run tests with pytest
        run: uv run pytest --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group lint

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run black check
        run: uv run black --check .

  build:
    if: ${{ !inputs.skip_build }}
    name: Build check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tina_bin: dist/tina
            quick_bin: dist/tina-quick
          - os: windows-latest
            tina_bin: dist/tina.exe
            quick_bin: dist/tina-quick.exe
          - os: macos-latest
            tina_bin: dist/tina
            quick_bin: dist/tina-quick

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --clean scripts/tina.spec
          uv run pyinstaller --clean scripts/tina-quick.spec

      - name: Verify binaries exist
        shell: bash
        run: |
          test -f ${{ matrix.tina_bin }} || (echo "tina binary not found" && exit 1)
          test -f ${{ matrix.quick_bin }} || (echo "tina-quick binary not found" && exit 1)
